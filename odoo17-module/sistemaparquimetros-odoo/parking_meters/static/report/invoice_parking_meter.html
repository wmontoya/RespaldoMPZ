<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura de Pago - Parquímetros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #f8f9fa;
            --accent-color: #3498db;
            --border-color: #dee2e6;
            --table-header-dark: #0056b3;
            /* Dark blue */
            --table-header-light: #4a9eff;
            /* Light blue */
            --table-even: #f1f9ff;
            --table-odd: #ffffff;
            --table-footer: #e6f2ff;
            --table-border: #bdd7ee;
        }

        @page {
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .receipt-container {
            padding: 2rem;
            margin: 2rem auto;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }


        .municipality-name {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .receipt-title {
            background-color: var(--secondary-color);
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .cashier-info {
            background-color: var(--secondary-color);
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .validation-notice {
            color: var(--primary-color);
            font-weight: bold;
            text-align: center;
            padding: 0.5rem;
            border: 1px dashed var(--primary-color);
            border-radius: 5px;
            margin: 1rem 0;
        }

        .copy-info {
            font-size: 0.9rem;
            color: #6c757d;
        }


        .receipt-table tr:nth-child(even) {
            background-color: #f1f9ff;
        }

        .receipt-table tfoot {
            background-color: #e6f2ff;
            font-weight: bold;
        }

        @media print {
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }

            .fontisiteprint {
                font-size: 12px;
            }

            .receipt-container {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
                border-radius: 0;
            }

            .table {
                width: 100%;
                border-collapse: collapse;
                font-size: 10px;
                margin: 5px 0;
            }

            .table,
            .table th,
            .table td {
                padding: 2px !important;
                border: 1px solid #bdd7ee !important;
            }
        }
    </style>
</head>

<body>
    <div class="receipt-container invoice-parking-meter">
        <div class="header text-center">
            <h6 class="municipality-name">Municipalidad de Pérez Zeledón</h6>
            <p class="mb-0 fontisiteprint">Fecha de Pago: {datenow}</p>
        </div>

        <div class="receipt-title text-center fontisiteprint">
            Comprobante de Pago de Boletas de Parquímetros
        </div>

        <table class="table table-bordered">
            {table_rows}
            <tfoot>
                <tr>
                    <td colspan="2" class="text-end fontisiteprint"><strong>Total a pagar:</strong></td>
                    <td class="amount-cell fontisiteprint"><strong> {totalamount} </strong></td>
                </tr>
            </tfoot>
        </table>

        <div class="cashier-info">
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-1 fontisiteprint">
                        <strong>Cajero:</strong> {cashier}
                    </p>
                </div>
            </div>
        </div>

        <div class="validation-notice fontisiteprint">
            No tiene validez sin el sello de cancelado
        </div>

        <div class="footer">
            <div class="row">
                <div class="col-6">
                    <p class="copy-info fontisiteprint"><i class="fas fa-file me-2"></i>Original - Contribuyente</p>
                </div>
                <div class="col-6 text-end">
                    <p class="copy-info fontisiteprint"><i class="fas fa-copy me-2"></i>Copia - Contabilidad</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
